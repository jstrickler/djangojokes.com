{% extends "_base.html" %}
{% block title %}Delete Joke{% endblock %}
{% block main %}
<div class="card border-primary m-auto mb-3 p-3"
style="max-width: 30rem">
    <form method="post">
        {% csrf_token %}
        <p><strong>Are you sure you want to delete this joke?</strong></p>
        <p>{{ joke.question }}</p>
    <button class='btn btn-success form-control'>Confirm</button>
    </form>
    <a href="{% url 'jokes:list' %}"><button class='btn btn-warning form-control'>Cancel and return to joke list</button></a>
</div>

{% endblock %}
